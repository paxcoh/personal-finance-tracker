<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | My Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        #toast-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
        }
        .toast-item { animation: none; width: 100%; }
        .popup-toast {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .dark .popup-toast {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .nav-link {
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        .dark .nav-link:hover {
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.05);
        }
        .nav-link i {
            margin-right: 0.5rem;
        }
        .nav-btn-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        @media (max-width: 640px) {
            .nav-btn-group {
                gap: 0.25rem;
            }
            .nav-link {
                padding: 0.4rem 0.6rem;
                font-size: 0.75rem;
            }
            .nav-link span {
                display: none;
            }
            .nav-link i {
                margin-right: 0;
            }
        }
        .nav-link-primary {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #059669;
        }
        .dark .nav-link-primary {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .nav-link-primary:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .nav-link-secondary {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #6366f1;
        }
        .dark .nav-link-secondary {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }
        .nav-link-secondary:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.3);
        }
        .nav-link-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #dc2626;
        }
        .dark .nav-link-danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .nav-link-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .nav-link-super {
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.2);
            color: #ca8a04;
        }
        .dark .nav-link-super {
            background: rgba(234, 179, 8, 0.1);
            border-color: rgba(234, 179, 8, 0.2);
            color: #fbbf24;
        }
        .nav-link-super:hover {
            background: rgba(234, 179, 8, 0.2);
            border-color: rgba(234, 179, 8, 0.3);
        }
        .nav-link-purple {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: #7c3aed;
        }
        .dark .nav-link-purple {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
        }
        .nav-link-purple:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.3);
        }
        .nav-link.active {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }
        .dark .nav-link.active {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
        
        <!-- Header -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-6 mb-8 border-b border-slate-200 dark:border-slate-800/80">
            <div class="flex items-center space-x-3">
                <span id="user-avatar" class="text-3xl bg-emerald-500/10 p-2 rounded-xl border border-emerald-500/20 dark:border-emerald-500/30">👤</span>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-emerald-300 bg-clip-text text-transparent">My Analytics</h1>
                    <p class="text-sm text-slate-500 dark:text-slate-400">Deep insights into your financial patterns</p>
                </div>
            </div>

            <!-- Navigation -->
            <div class="nav-btn-group w-full sm:w-auto justify-end">
                <a href="/index.html" class="nav-link nav-link-primary">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                    <span>Dashboard</span>
                </a>
                
                <a href="/analytics.html" class="nav-link nav-link-secondary active">
                    <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                    <span>My Analytics</span>
                </a>

                <a id="system-analytics-nav" href="/super-analytics.html" class="hidden nav-link nav-link-super">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                    <span>System Analytics</span>
                </a>

                <a id="admin-nav-btn" href="/admin.html" class="hidden nav-link nav-link-purple">
                    <i data-lucide="users" class="w-4 h-4"></i>
                    <span>Users</span>
                </a>
                
                <a href="/settings.html" class="nav-link nav-link-secondary">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                    <span>Settings</span>
                </a>
                
                <select id="period-select" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-1.5 text-sm focus:outline-none focus:border-emerald-500 dark:focus:border-emerald-500/80 transition-all">
                    <option value="month">Last 30 Days</option>
                    <option value="quarter">Last 90 Days</option>
                    <option value="year">Last 365 Days</option>
                    <option value="all">All Time</option>
                </select>
                
                <button id="theme-toggle" class="nav-link bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 p-2">
                    <i id="theme-toggle-dark-icon" data-lucide="moon" class="w-4 h-4 hidden"></i>
                    <i id="theme-toggle-light-icon" data-lucide="sun" class="w-4 h-4 hidden"></i>
                </button>
                
                <button id="btn-logout" class="nav-link nav-link-danger">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span>Logout</span>
                </button>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Income</p>
                <p id="analytics-income" class="text-2xl font-bold text-emerald-500 dark:text-emerald-400 mt-2">$0.00</p>
            </div>
            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Expenses</p>
                <p id="analytics-expenses" class="text-2xl font-bold text-red-500 dark:text-red-400 mt-2">$0.00</p>
            </div>
            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Net Savings</p>
                <p id="analytics-savings" class="text-2xl font-bold text-indigo-500 dark:text-indigo-400 mt-2">$0.00</p>
            </div>
            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Transactions</p>
                <p id="analytics-count" class="text-2xl font-bold text-slate-900 dark:text-white mt-2">0</p>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm">
                <h3 class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4">Income vs Expense Trend</h3>
                <div class="h-[300px]">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm">
                <h3 class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4">Expense by Category</h3>
                <div class="h-[300px]">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm">
                <h3 class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4">Income by Category</h3>
                <div class="h-[300px]">
                    <canvas id="incomeCategoryChart"></canvas>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm">
                <h3 class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4">Monthly Summary</h3>
                <div class="space-y-3" id="monthly-summary">
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Overlay -->
    <div id="toast-overlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-[9998] opacity-0 pointer-events-none transition-opacity duration-300"></div>
    <div id="toast-container" class="fixed inset-0 z-[9999] flex items-center justify-center pointer-events-none"></div>

    <script src="analytics.js"></script>
    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'light' || (!('color-theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
            lightIcon.classList.add('hidden');
            darkIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.add('dark');
            darkIcon.classList.add('hidden');
            lightIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        async function checkAdminStatus() {
            try {
                const response = await fetch('/api/auth/status');
                const data = await response.json();
                if (data.authenticated) {
                    if (data.user.role === 'admin') {
                        document.getElementById('admin-nav-btn').classList.remove('hidden');
                    }
                    if (data.user.isSuperAdmin === 1) {
                        document.getElementById('system-analytics-nav').classList.remove('hidden');
                    }
                }
            } catch (error) {
                console.error('Failed to check admin status:', error);
            }
        }
        checkAdminStatus();

        document.getElementById('btn-logout').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/auth/logout', { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/login.html';
                }
            } catch (error) {
                console.error('Logout failed:', error);
            }
        });
    </script>
</body>
</html>
