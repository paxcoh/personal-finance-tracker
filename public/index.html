<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 15px;">
            <div>
                <h1>💰 FinanceFlow</h1>
                <p>Welcome back, <span id="user-display-name" style="color: var(--primary); font-weight: 600;">User</span>!</p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <a id="admin-nav-btn" href="/admin.html" class="btn" style="display: none; background-color: #6366f1; color: white; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 0.9rem;">
                    Admin Panel
                </a>
                <button id="btn-logout" class="btn-cancel" style="width: auto; margin-top: 0; padding: 10px 18px; color: var(--danger); border-color: var(--danger);">
                    Sign Out
                </button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Total Balance</h3>
                <p id="total-balance" class="balance">$0.00</p>
            </div>
            <div class="card">
                <h3>Total Income</h3>
                <p id="total-income" class="balance income">+$0.00</p>
            </div>
            <div class="card">
                <h3>Total Expenses</h3>
                <p id="total-expenses" class="balance expense">-$0.00</p>
            </div>
        </div>

        <div class="dashboard-grid" style="grid-template-columns: 1fr 2fr; margin-top: 32px;">
            
            <div class="card">
                <h2 id="form-title">New Transaction</h2>
                <form id="transaction-form">
                    <input type="hidden" id="edit-id" value="">

                    <div class="input-group">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="income">Income (+)</option>
                            <option value="expense">Expense (-)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="category">Category</label>
                        <input type="text" id="category" placeholder="e.g., Salary, Rent, Food" required>
                    </div>
                    <div class="input-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="input-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    
                    <button type="submit" id="btn-submit" class="btn-submit">Save Transaction</button>
                    <button type="button" id="btn-cancel" class="btn-cancel" style="display: none;">Cancel Edit</button>
                </form>
            </div>

            <div class="card">
                <h2>Transaction History</h2>
                <div style="overflow-x: auto; margin-top: 16px;">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-rows">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
