<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>💰 FinanceFlow</h1>
            <p>Your money, organized beautifully.</p>
        </header>

        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Current Balance</h3>
                <p id="total-balance">$0.00</p>
            </div>
            <div class="metric-card income">
                <h3>Total Income</h3>
                <p id="total-income">$0.00</p>
            </div>
            <div class="metric-card expense">
                <h3>Total Expenses</h3>
                <p id="total-expenses">$0.00</p>
            </div>
        </div>

        <main class="main-content">
            <section class="panel">
                <h2>Add Transaction</h2>
                <form id="transaction-form">
    <input type="hidden" id="edit-id" value="">

    <div class="input-group">
        <label for="type">Type</label>
        <select id="type" required>
            <option value="income">Income (+)</option>
            <option value="expense">Expense (-)</option>
        </select>
    </div>
    <div class="input-group">
        <label for="category">Category</label>
        <input type="text" id="category" placeholder="e.g. Salary, Rent, Food" required>
    </div>
    <div class="input-group">
        <label for="amount">Amount ($)</label>
        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
    </div>
    <div class="input-group">
        <label for="date">Date</label>
        <input type="date" id="date" required>
    </div>
    
    <button type="submit" id="btn-submit" class="btn-submit">Save Transaction</button>
    <button type="button" id="btn-cancel" class="btn-cancel" style="display: none;">Cancel Edit</button>
</form>
            </section>

            <section class="panel">
                <h2>Transaction History</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-rows">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
