<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        #toast-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
        }
        .toast-item {
            animation: none;
            width: 100%;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <!-- Glow Backdrops (Dark Mode Only) -->
    <div class="hidden dark:block absolute top-0 left-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="hidden dark:block absolute top-1/3 right-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
        
        <!-- Header Section -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-6 mb-8 border-b border-slate-200 dark:border-slate-800/80">
            <div class="flex items-center space-x-3">
                <div class="bg-emerald-500/10 p-2.5 rounded-xl border border-emerald-500/20 dark:border-emerald-500/30 text-emerald-500 dark:text-emerald-400">
                    <i data-lucide="wallet-cards" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-slate-300 bg-clip-text text-transparent">FinanceFlow</h1>
                    <p class="text-sm text-slate-500 dark:text-slate-400">Welcome back, <span id="user-display-name" class="font-semibold text-emerald-500 dark:text-emerald-400">User</span>!</p>
                </div>
            </div>

            <!-- Dynamic UI Control Buttons -->
            <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                <!-- Dark Mode Selector Toggle -->
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/80 transition-all">
                    <i id="theme-toggle-dark-icon" data-lucide="moon" class="w-5 h-5 hidden"></i>
                    <i id="theme-toggle-light-icon" data-lucide="sun" class="w-5 h-5 hidden"></i>
                </button>
                
                <a id="admin-nav-btn" href="/admin.html" class="hidden items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-4 py-2.5 rounded-xl transition-all shadow-lg shadow-indigo-600/10">
                    <i data-lucide="shield-check" class="w-4 h-4"></i> Admin Panel
                </a>
                
                <button id="btn-logout" class="flex items-center gap-2 bg-transparent hover:bg-red-50 dark:hover:bg-red-950/20 text-red-500 dark:text-red-400 text-sm font-semibold px-4 py-2.5 rounded-xl border border-red-200 dark:border-red-900/30 transition-all">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
                </button>
            </div>
        </header>

        <!-- Dynamic Financial Metrics Row -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Total Balance Card -->
            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm backdrop-blur-md relative overflow-hidden">
                <div class="absolute -right-4 -top-4 text-slate-100 dark:text-slate-800/30 -z-10">
                    <i data-lucide="scale" class="w-24 h-24"></i>
                </div>
                <h3 class="text-xs font-semibold text-slate-400 tracking-wider uppercase">Net Capital</h3>
                <p id="total-balance" class="text-3xl font-bold mt-2 text-slate-900 dark:text-white">$0.00</p>
                <div class="mt-2 text-xs text-slate-400">Current active ledger savings</div>
            </div>

            <!-- Total Income Card -->
            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm backdrop-blur-md relative overflow-hidden">
                <div class="absolute -right-4 -top-4 text-emerald-500/5 -z-10">
                    <i data-lucide="arrow-up-right" class="w-24 h-24"></i>
                </div>
                <h3 class="text-xs font-semibold text-slate-400 tracking-wider uppercase">Total Earnings</h3>
                <p id="total-income" class="text-3xl font-bold mt-2 text-emerald-500 dark:text-emerald-400">+$0.00</p>
                <div class="mt-2 text-xs text-emerald-500/80 flex items-center gap-1">
                    <i data-lucide="trending-up" class="w-3.5 h-3.5"></i> Platform-wide updates
                </div>
            </div>

            <!-- Total Expense Card -->
            <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm backdrop-blur-md relative overflow-hidden">
                <div class="absolute -right-4 -top-4 text-red-500/5 -z-10">
                    <i data-lucide="arrow-down-left" class="w-24 h-24"></i>
                </div>
                <h3 class="text-xs font-semibold text-slate-400 tracking-wider uppercase">Total Outflow</h3>
                <p id="total-expenses" class="text-3xl font-bold mt-2 text-red-500 dark:text-red-400">-$0.00</p>
                <div class="mt-2 text-xs text-red-400/80 flex items-center gap-1">
                    <i data-lucide="trending-down" class="w-3.5 h-3.5"></i> Controlled expenses
                </div>
            </div>
        </section>

        <!-- Transaction Manager Layout Split -->
        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Entry Logging Form Card -->
            <div class="lg:col-span-4 bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm backdrop-blur-md h-fit">
                <h2 id="form-title" class="text-lg font-bold text-slate-900 dark:text-white mb-5 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-emerald-500"></i> New Transaction
                </h2>
                
                <form id="transaction-form" class="space-y-4">
                    <input type="hidden" id="edit-id" value="">

                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-slate-500 dark:text-slate-400">Transaction Type</label>
                        <select id="type" class="w-full bg-slate-50 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 dark:focus:border-emerald-500/80 transition-all text-slate-900 dark:text-slate-100" required>
                            <option value="income">Income (+)</option>
                            <option value="expense">Expense (-)</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-slate-500 dark:text-slate-400">Category</label>
                        <input type="text" id="category" placeholder="e.g. Salary, Groceries" class="w-full bg-slate-50 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 dark:focus:border-emerald-500/80 transition-all text-slate-900 dark:text-slate-100" required>
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-slate-500 dark:text-slate-400">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" class="w-full bg-slate-50 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 dark:focus:border-emerald-500/80 transition-all text-slate-900 dark:text-slate-100" required>
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-slate-500 dark:text-slate-400">Date</label>
                        <input type="date" id="date" class="w-full bg-slate-50 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 dark:focus:border-emerald-500/80 transition-all text-slate-900 dark:text-slate-100" required>
                    </div>
                    
                    <div class="pt-2 space-y-2">
                        <button type="submit" id="btn-submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3 px-4 rounded-xl flex justify-center items-center gap-2 shadow-lg shadow-emerald-500/10 transition-all active:scale-[0.98]">
                            Save Transaction
                        </button>
                        <button type="button" id="btn-cancel" class="hidden w-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-800 dark:text-slate-200 font-semibold py-2.5 px-4 rounded-xl transition-all">
                            Cancel Edit
                        </button>
                    </div>
                </form>
            </div>

            <!-- Transaction Ledger -->
            <div class="lg:col-span-8 bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm backdrop-blur-md">
                <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-5 flex items-center gap-2">
                    <i data-lucide="history" class="w-5 h-5 text-indigo-500"></i> Ledger Records
                </h2>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-100 dark:border-slate-800">
                                <th class="pb-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Date</th>
                                <th class="pb-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Category</th>
                                <th class="pb-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Type</th>
                                <th class="pb-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Amount</th>
                                <th class="pb-3 text-xs font-semibold text-slate-400 uppercase tracking-wider text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-rows" class="divide-y divide-slate-100 dark:divide-slate-800/50">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Overlay -->
    <div id="toast-overlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-[9998] opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed inset-0 z-[9999] flex items-center justify-center pointer-events-none">
        <!-- Toasts will be inserted here -->
    </div>

    <!-- UI Core Scripts -->
    <script src="app.js"></script>
    <script>
        // System-Wide Dark Mode Sync script
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        // Check user preferences
        if (localStorage.getItem('color-theme') === 'light' || (!('color-theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
            lightIcon.classList.add('hidden');
            darkIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.add('dark');
            darkIcon.classList.add('hidden');
            lightIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });
    </script>
</body>
</html>
